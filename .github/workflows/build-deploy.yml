name: Build and Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.15/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version
          cargo-build-sbf --help || true

      - name: Build SBF program
        run: |
          cargo --version
          cargo-build-sbf --manifest-path programs/validator_lock/Cargo.toml
          ls -la programs/validator_lock/target/deploy || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validator_lock-program
          path: |
            programs/validator_lock/target/deploy/validator_lock.so
