name: Build and Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI (GitHub tarball)
        run: |
          mkdir -p $HOME/solana
          wget -O $HOME/solana/solana.tar.bz2 https://github.com/solana-labs/solana/releases/download/v1.18.15/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          mkdir -p $HOME/solana/release
          tar -xjf $HOME/solana/solana.tar.bz2 -C $HOME/solana/release
          echo "$HOME/solana/release/solana-release/bin" >> $GITHUB_PATH
          $HOME/solana/release/solana-release/bin/solana --version
          $HOME/solana/release/solana-release/bin/cargo-build-sbf --help || true

      - name: Prepare v3 Cargo.lock with Rust 1.75
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.75.0
          override: false
      - name: Regenerate lockfile as v3
        run: |
          pushd programs/validator_lock
          rm -f Cargo.lock
          rustup run 1.75.0 cargo generate-lockfile
          popd

      - name: Build SBF program
        run: |
          cargo --version
          $HOME/solana/release/solana-release/bin/cargo-build-sbf --manifest-path programs/validator_lock/Cargo.toml
          ls -la programs/validator_lock/target/deploy || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validator_lock-program
          path: |
            programs/validator_lock/target/deploy/validator_lock.so
