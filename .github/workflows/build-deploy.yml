name: Build and Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.82 (host toolchain)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.82.0
          override: true

      - name: Install Solana CLI (GitHub tarball)
        run: |
          mkdir -p $HOME/solana
          wget -O $HOME/solana/solana.tar.bz2 https://github.com/solana-labs/solana/releases/download/v1.18.26/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          mkdir -p $HOME/solana/release
          tar -xjf $HOME/solana/solana.tar.bz2 -C $HOME/solana/release
          echo "$HOME/solana/release/solana-release/bin" >> $GITHUB_PATH
          $HOME/solana/release/solana-release/bin/solana --version
          $HOME/solana/release/solana-release/bin/cargo-build-sbf --help || true

      - name: Install Anchor CLI (prebuilt) and set up wallet
        run: |
          mkdir -p $HOME/.cargo/bin
          wget -O /tmp/anchor.tar.gz https://github.com/coral-xyz/anchor/releases/download/v0.30.1/anchor-cli-v0.30.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/anchor.tar.gz -C /tmp
          ANCHOR_BIN=$(find /tmp -maxdepth 2 -type f -name anchor | head -n 1)
          cp "$ANCHOR_BIN" $HOME/.cargo/bin/anchor
          chmod +x $HOME/.cargo/bin/anchor
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          anchor --version
          mkdir -p ~/.config/solana
          $HOME/solana/release/solana-release/bin/solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Build program (anchor)
        run: |
          anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validator_lock-program
          path: |
            target/deploy/validator_lock.so
            target/deploy/validator_lock-keypair.json
            target/idl/validator_lock.json
