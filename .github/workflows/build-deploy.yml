name: Build and Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.15/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      
      - name: Install Rust (pinned to 1.75.0 for Anchor 0.30.1 compatibility)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.75.0
          override: true
      
      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.30.1
          avm use 0.30.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
      
      - name: Build program
        run: |
          anchor build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validator_lock-program
          path: |
            target/deploy/validator_lock.so
            target/deploy/validator_lock-keypair.json
            target/idl/validator_lock.json
      
      - name: Deploy to devnet (if secrets present)
        if: env.SOLANA_DEPLOYER_KEY != ''
        env:
          SOLANA_DEPLOYER_KEY: ${{ secrets.SOLANA_DEPLOYER_KEY }}
        run: |
          echo "${{ secrets.SOLANA_DEPLOYER_KEY }}" > deployer.json
          solana config set --url https://api.devnet.solana.com
          solana airdrop 2 -k deployer.json || true
          anchor deploy --provider.cluster devnet --provider.wallet deployer.json
          PID=$(solana address -k target/deploy/validator_lock-keypair.json)
          echo "Program ID: $PID"
          solana program show "$PID"
