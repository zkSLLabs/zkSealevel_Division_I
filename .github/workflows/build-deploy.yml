name: Build and Deploy to Devnet

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    container:
      image: docker.io/solanalabs/solana:v1.19.5
    steps:
      - uses: actions/checkout@v4

      - name: Build SBF program
        run: |
          cargo --version
          rustc --version
          cargo-build-sbf --manifest-path programs/validator_lock/Cargo.toml
          ls -la programs/validator_lock/target/deploy || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validator_lock-program
          path: |
            programs/validator_lock/target/deploy/validator_lock.so
